name: cyber_com
description: "Cyber Com - Xavfsiz va zamonaviy messenjer"
publish_to: 'none'
version: 1.0.0+7

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # --- FIREBASE ---
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_storage: ^12.3.2
  firebase_messaging: ^15.1.3
  shorebird_code_push: ^2.0.5
  # --- UI & UX ---
  cupertino_icons: ^1.0.8
  font_awesome_flutter: ^10.8.0
  google_fonts: ^6.2.1
  lottie: ^3.1.2
  flutter_spinkit: ^5.2.1
  shimmer: ^3.0.0
  cached_network_image: ^3.4.1
  flutter_svg: ^2.0.10+1

  # --- MULTIMEDIA ---
  image_picker: ^1.1.2
  file_picker: ^8.1.5
  video_player: ^2.9.2
  chewie: ^1.8.5
  
  # --- DATA MANAGEMENT ---
  provider: ^6.1.2
  shared_preferences: ^2.3.2
  socket_io_client: ^3.1.2
  uuid: ^4.5.1
  intl: ^0.20.2 # 'any' o'rniga aniq versiya yaxshi

  # --- CHAT UI ---
  flutter_chat_ui: ^2.11.1
  flutter_link_previewer: ^3.2.2
  
  # --- LOCALIZATION & NETWORK ---
  easy_localization: ^3.0.7
  dio: ^5.7.0

  # --- SYSTEM & UTILS ---
  url_launcher: ^6.3.1
  share_plus: ^10.1.4
  path_provider: ^2.1.5
  permission_handler: ^11.3.1
  youtube_player_flutter: ^9.1.1
  # --- NOTIFICATIONS ---
  overlay_support: ^2.1.0
  flutter_local_notifications: ^17.2.4
  timezone: ^0.9.4

  # --- AUTHENTICATION ---
  google_sign_in: ^6.2.1
  geolocator: ^14.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0 
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/logo.png"
  adaptive_icon_background: "#2563EB"
  adaptive_icon_foreground: "assets/logo.png"

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png
    - assets/translations/
    - shorebird.yaml  # Lottie animatsiyalari uchun papka